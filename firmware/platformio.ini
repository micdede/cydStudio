; cydStudio firmware — generic ESP32 renderer
;
; Each board is its own env. Common toolchain/lib config lives in
; the [_esp32_base] / [_esp32s3_base] templates below; envs extend one
; of them and add only their board-specific build flag and partition table.
;
; Display driver choice: most boards use TFT_eSPI (ILI9341, ST7789, GC9107)
; via per-board build flags. The AMOLED boards use LovyanGFX (RM67162 over
; QSPI) — TFT_eSPI does not support that. Both drivers go through the
; firmware/src/display.cpp HAL so the renderer is driver-agnostic.
;
; To build for the CYD:    pio run -e cyd-2432s028
; To OTA-flash a device:   pio run -e cyd-2432s028-ota -t upload

[platformio]
src_dir = src
include_dir = include
default_envs = cyd-2432s028

; ---------------------------------------------------------------------------
; Shared lib + flag templates (not buildable on their own)
; ---------------------------------------------------------------------------

[_common]
framework = arduino
monitor_speed = 115200
upload_speed = 460800              ; CH340 is unreliable above this
lib_ldf_mode = deep+
lib_deps =
  lvgl/lvgl@8.3.11
  bblanchon/ArduinoJson@^7.0.4
build_flags =
  -D LV_CONF_INCLUDE_SIMPLE
  -D CORE_DEBUG_LEVEL=2
  -I include

[_esp32_base]
extends = _common
platform = espressif32@^6.5.0
board = esp32dev
board_build.partitions = partitions/default.csv
build_flags =
  ${_common.build_flags}
  -D CYDSTUDIO_CHIP_ESP32

[_esp32s3_base]
extends = _common
platform = espressif32@^6.5.0
board = esp32-s3-devkitc-1
board_build.partitions = partitions/default.csv
board_build.arduino.memory_type = qio_opi
build_flags =
  ${_common.build_flags}
  -D CYDSTUDIO_CHIP_ESP32S3
  -D BOARD_HAS_PSRAM
  -D ARDUINO_USB_CDC_ON_BOOT=1

; TFT_eSPI driver group (most boards). Pin/driver flags come from each board env.
[_tft_espi]
lib_deps =
  bodmer/TFT_eSPI@^2.5.43
build_flags =
  -D USER_SETUP_LOADED=1
  -D LOAD_GLCD=1
  -D LOAD_FONT2=1
  -D LOAD_GFXFF=1
  -D SMOOTH_FONT=1
  -D SPI_FREQUENCY=55000000
  -D SPI_READ_FREQUENCY=20000000

; LovyanGFX driver group (AMOLED). Excludes the conflicting bundled lvgl bridge.
[_lovyangfx]
lib_deps =
  lovyan03/LovyanGFX@^1.1.16
build_flags =
  -D LGFX_USE_V1
  -D CYDSTUDIO_USE_LOVYANGFX

; ---------------------------------------------------------------------------
; Board envs
; ---------------------------------------------------------------------------

[env:cyd-2432s028]
extends = _esp32_base
lib_deps =
  ${_esp32_base.lib_deps}
  ${_tft_espi.lib_deps}
build_flags =
  ${_esp32_base.build_flags}
  ${_tft_espi.build_flags}
  -D CYDSTUDIO_BOARD_CYD_2432S028
  -D ILI9341_2_DRIVER=1
  -D TFT_WIDTH=240
  -D TFT_HEIGHT=320
  -D TFT_MISO=12
  -D TFT_MOSI=13
  -D TFT_SCLK=14
  -D TFT_CS=15
  -D TFT_DC=2
  -D TFT_RST=-1
  -D TFT_BL=21
  -D TFT_BACKLIGHT_ON=HIGH

[env:cyd-2432s028r]
; Same as 2432S028 plus XPT2046 resistive touch wired up via TFT_eSPI's
; touch pins (CLK=25, MOSI=32, MISO=39, CS=33).
extends = _esp32_base
lib_deps =
  ${_esp32_base.lib_deps}
  ${_tft_espi.lib_deps}
build_flags =
  ${_esp32_base.build_flags}
  ${_tft_espi.build_flags}
  -D CYDSTUDIO_BOARD_CYD_2432S028R
  -D CYDSTUDIO_HAS_TOUCH
  -D ILI9341_2_DRIVER=1
  -D TFT_WIDTH=240
  -D TFT_HEIGHT=320
  -D TFT_MISO=12
  -D TFT_MOSI=13
  -D TFT_SCLK=14
  -D TFT_CS=15
  -D TFT_DC=2
  -D TFT_RST=-1
  -D TFT_BL=21
  -D TFT_BACKLIGHT_ON=HIGH
  -D TOUCH_CS=33

[env:t-display]
; LILYGO T-Display — 135x240 ST7789, ESP32, no touch
extends = _esp32_base
lib_deps =
  ${_esp32_base.lib_deps}
  ${_tft_espi.lib_deps}
build_flags =
  ${_esp32_base.build_flags}
  ${_tft_espi.build_flags}
  -D CYDSTUDIO_BOARD_LILYGO_T_DISPLAY

[env:t-display-s3]
; LILYGO T-Display S3 — 170x320 ST7789, ESP32-S3, no touch
extends = _esp32s3_base
lib_deps =
  ${_esp32s3_base.lib_deps}
  ${_tft_espi.lib_deps}
build_flags =
  ${_esp32s3_base.build_flags}
  ${_tft_espi.build_flags}
  -D CYDSTUDIO_BOARD_LILYGO_T_DISPLAY_S3

[env:t-qt-pro]
; LILYGO T-QT Pro — 128x128 GC9107, ESP32-S3, no touch
extends = _esp32s3_base
lib_deps =
  ${_esp32s3_base.lib_deps}
  ${_tft_espi.lib_deps}
build_flags =
  ${_esp32s3_base.build_flags}
  ${_tft_espi.build_flags}
  -D CYDSTUDIO_BOARD_LILYGO_T_QT_PRO

[env:t-display-s3-amoled]
; LILYGO T-Display S3 AMOLED — 536x240 RM67162 over QSPI. Needs LovyanGFX.
extends = _esp32s3_base
lib_deps =
  ${_esp32s3_base.lib_deps}
  ${_lovyangfx.lib_deps}
build_flags =
  ${_esp32s3_base.build_flags}
  ${_lovyangfx.build_flags}
  -D CYDSTUDIO_BOARD_LILYGO_T_DISPLAY_S3_AMOLED

; ---------------------------------------------------------------------------
; OTA mirror envs (set upload_port to your device's mDNS name at flash time)
; ---------------------------------------------------------------------------

[env:cyd-2432s028-ota]
extends = env:cyd-2432s028
upload_protocol = espota
upload_port = claude-monitor.local
upload_flags =
  --auth=claude-monitor-ota
