; cydStudio firmware — generic ESP32 renderer
;
; Each board is its own env. Common toolchain/lib config lives in
; the [_esp32_base] / [_esp32s3_base] templates below; envs extend one
; of them and add only their board-specific build flags + pin defs.
;
; Display driver choice: most boards use TFT_eSPI (ILI9341, ST7789, GC9107)
; via per-board build flags. The AMOLED boards will use LovyanGFX
; (RM67162 over QSPI) — TFT_eSPI does not support that.
;
; To build for a board:    pio run -e <env-name>
; To OTA-flash a device:   pio run -e <env-name>-ota -t upload
;
; **Phase 5 board profiles (T-Display, T-Display S3, T-QT Pro) are
;   unverified on hardware.** First-boot test pattern is the canary —
;   if it shows the right resolution + a blue→red gradient, your pin
;   map is good.

[platformio]
src_dir = src
include_dir = include
default_envs = cyd-2432s028

; ---------------------------------------------------------------------------
; Shared lib + flag templates (not buildable on their own)
; ---------------------------------------------------------------------------

[_common]
framework = arduino
monitor_speed = 115200
upload_speed = 460800              ; CH340 is unreliable above this
lib_ldf_mode = deep+
lib_deps =
  lvgl/lvgl@8.3.11
  bblanchon/ArduinoJson@^7.0.4
build_flags =
  -D LV_CONF_INCLUDE_SIMPLE
  -D CORE_DEBUG_LEVEL=2
  -I include

[_esp32_base]
extends = _common
platform = espressif32@^6.5.0
board = esp32dev
board_build.partitions = partitions/default.csv
build_flags =
  ${_common.build_flags}
  -D CYDSTUDIO_CHIP_ESP32

[_esp32s3_base]
extends = _common
platform = espressif32@^6.5.0
board = esp32-s3-devkitc-1
board_build.partitions = partitions/default.csv
board_build.arduino.memory_type = qio_opi
build_flags =
  ${_common.build_flags}
  -D CYDSTUDIO_CHIP_ESP32S3
  -D BOARD_HAS_PSRAM
  -D ARDUINO_USB_CDC_ON_BOOT=1

[_tft_espi]
lib_deps =
  bodmer/TFT_eSPI@^2.5.43
build_flags =
  -D USER_SETUP_LOADED=1
  -D LOAD_GLCD=1
  -D LOAD_FONT2=1
  -D LOAD_GFXFF=1
  -D SMOOTH_FONT=1
  -D SPI_FREQUENCY=40000000
  -D SPI_READ_FREQUENCY=20000000

; ---------------------------------------------------------------------------
; Board envs
; ---------------------------------------------------------------------------

[env:cyd-2432s028]
extends = _esp32_base
lib_deps =
  ${_esp32_base.lib_deps}
  ${_tft_espi.lib_deps}
build_flags =
  ${_esp32_base.build_flags}
  ${_tft_espi.build_flags}
  -D SPI_FREQUENCY=55000000
  -D CYDSTUDIO_BOARD_CYD_2432S028
  -D ILI9341_2_DRIVER=1
  -D TFT_WIDTH=240
  -D TFT_HEIGHT=320
  -D TFT_MISO=12
  -D TFT_MOSI=13
  -D TFT_SCLK=14
  -D TFT_CS=15
  -D TFT_DC=2
  -D TFT_RST=-1
  -D TFT_BL=21
  -D TFT_BACKLIGHT_ON=HIGH

[env:cyd-2432s028r]
extends = _esp32_base
lib_deps =
  ${_esp32_base.lib_deps}
  ${_tft_espi.lib_deps}
build_flags =
  ${_esp32_base.build_flags}
  ${_tft_espi.build_flags}
  -D SPI_FREQUENCY=55000000
  -D CYDSTUDIO_BOARD_CYD_2432S028R
  -D CYDSTUDIO_HAS_TOUCH
  -D ILI9341_2_DRIVER=1
  -D TFT_WIDTH=240
  -D TFT_HEIGHT=320
  -D TFT_MISO=12
  -D TFT_MOSI=13
  -D TFT_SCLK=14
  -D TFT_CS=15
  -D TFT_DC=2
  -D TFT_RST=-1
  -D TFT_BL=21
  -D TFT_BACKLIGHT_ON=HIGH
  -D TOUCH_CS=33

[env:t-display]
; LILYGO T-Display — ESP32 + 1.14" ST7789, 135x240
extends = _esp32_base
lib_deps =
  ${_esp32_base.lib_deps}
  ${_tft_espi.lib_deps}
build_flags =
  ${_esp32_base.build_flags}
  ${_tft_espi.build_flags}
  -D CYDSTUDIO_BOARD_LILYGO_T_DISPLAY
  -D ST7789_DRIVER=1
  -D CGRAM_OFFSET=1
  -D TFT_WIDTH=135
  -D TFT_HEIGHT=240
  -D TFT_MOSI=19
  -D TFT_SCLK=18
  -D TFT_CS=5
  -D TFT_DC=16
  -D TFT_RST=23
  -D TFT_BL=4
  -D TFT_BACKLIGHT_ON=1

[env:t-display-s3]
; LILYGO T-Display S3 — ESP32-S3 + 1.9" ST7789, 170x320 (8-bit parallel)
extends = _esp32s3_base
lib_deps =
  ${_esp32s3_base.lib_deps}
  ${_tft_espi.lib_deps}
build_flags =
  ${_esp32s3_base.build_flags}
  ${_tft_espi.build_flags}
  -D CYDSTUDIO_BOARD_LILYGO_T_DISPLAY_S3
  -D ST7789_DRIVER=1
  -D TFT_PARALLEL_8_BIT
  -D TFT_WIDTH=170
  -D TFT_HEIGHT=320
  -D TFT_CS=6
  -D TFT_DC=7
  -D TFT_RST=5
  -D TFT_WR=8
  -D TFT_RD=9
  -D TFT_D0=39
  -D TFT_D1=40
  -D TFT_D2=41
  -D TFT_D3=42
  -D TFT_D4=45
  -D TFT_D5=46
  -D TFT_D6=47
  -D TFT_D7=48
  -D TFT_BL=38
  -D TFT_BACKLIGHT_ON=1

[env:t-qt-pro]
; LILYGO T-QT Pro — ESP32-S3 + 0.85" GC9107, 128x128
extends = _esp32s3_base
lib_deps =
  ${_esp32s3_base.lib_deps}
  ${_tft_espi.lib_deps}
build_flags =
  ${_esp32s3_base.build_flags}
  ${_tft_espi.build_flags}
  -D CYDSTUDIO_BOARD_LILYGO_T_QT_PRO
  -D GC9A01_DRIVER=1
  -D TFT_WIDTH=128
  -D TFT_HEIGHT=128
  -D TFT_MOSI=2
  -D TFT_SCLK=3
  -D TFT_CS=5
  -D TFT_DC=6
  -D TFT_RST=1
  -D TFT_BL=10
  -D TFT_BACKLIGHT_ON=1

[env:t-display-s3-amoled]
; LILYGO T-Display S3 AMOLED — RM67162 QSPI 536x240. Needs LovyanGFX +
; a workaround for the LovyanGFX-bundles-its-own-LVGL-fonts link conflict.
; Currently disabled — see boards/dispatch.h for status.
extends = _esp32s3_base
build_flags =
  ${_esp32s3_base.build_flags}
  -D CYDSTUDIO_BOARD_LILYGO_T_DISPLAY_S3_AMOLED

; ---------------------------------------------------------------------------
; OTA mirror envs (override upload_port at flash time if hostname differs)
; ---------------------------------------------------------------------------

[env:cyd-2432s028-ota]
extends = env:cyd-2432s028
upload_protocol = espota
upload_port = claude-monitor.local
upload_flags =
  --auth=claude-monitor-ota
