; cydStudio firmware — generic ESP32 renderer
;
; Each board is its own env. Common toolchain/lib config lives in
; the [_esp32_base] / [_esp32s3_base] templates below; envs extend one
; of them and add only their board-specific build flag and partition table.
;
; To build for the CYD:    pio run -e cyd-2432s028
; To OTA-flash a device:   pio run -e cyd-2432s028-ota -t upload

[platformio]
src_dir = src
include_dir = include
default_envs = cyd-2432s028

; ---------------------------------------------------------------------------
; Shared lib + flag templates (not buildable on their own)
; ---------------------------------------------------------------------------

[_common]
framework = arduino
monitor_speed = 115200
upload_speed = 460800              ; CH340 is unreliable above this
lib_ldf_mode = deep+
lib_deps =
  lovyan03/LovyanGFX@^1.1.16
  lvgl/lvgl@8.3.11
  bblanchon/ArduinoJson@^7.0.4
  https://github.com/tzapu/WiFiManager.git
build_flags =
  -D LV_CONF_INCLUDE_SIMPLE
  -D CORE_DEBUG_LEVEL=2
  -I include

[_esp32_base]
extends = _common
platform = espressif32@^6.5.0
board = esp32dev
board_build.partitions = partitions/default.csv
build_flags =
  ${_common.build_flags}
  -D CYDSTUDIO_CHIP_ESP32

[_esp32s3_base]
extends = _common
platform = espressif32@^6.5.0
board = esp32-s3-devkitc-1
board_build.partitions = partitions/default.csv
board_build.arduino.memory_type = qio_opi   ; PSRAM-friendly default
build_flags =
  ${_common.build_flags}
  -D CYDSTUDIO_CHIP_ESP32S3
  -D BOARD_HAS_PSRAM
  -D ARDUINO_USB_CDC_ON_BOOT=1

; ---------------------------------------------------------------------------
; Board envs
; ---------------------------------------------------------------------------

[env:cyd-2432s028]
extends = _esp32_base
build_flags =
  ${_esp32_base.build_flags}
  -D CYDSTUDIO_BOARD_CYD_2432S028

[env:cyd-2432s028r]
; Same as 2432S028 but with XPT2046 resistive touch wired up.
extends = _esp32_base
build_flags =
  ${_esp32_base.build_flags}
  -D CYDSTUDIO_BOARD_CYD_2432S028R
  -D CYDSTUDIO_HAS_TOUCH

[env:t-display]
; LILYGO T-Display — 135x240 ST7789, ESP32, no touch
extends = _esp32_base
build_flags =
  ${_esp32_base.build_flags}
  -D CYDSTUDIO_BOARD_LILYGO_T_DISPLAY

[env:t-display-s3]
; LILYGO T-Display S3 — 170x320 ST7789, ESP32-S3, no touch
extends = _esp32s3_base
build_flags =
  ${_esp32s3_base.build_flags}
  -D CYDSTUDIO_BOARD_LILYGO_T_DISPLAY_S3

[env:t-qt-pro]
; LILYGO T-QT Pro — 128x128 GC9107, ESP32-S3, no touch
extends = _esp32s3_base
build_flags =
  ${_esp32s3_base.build_flags}
  -D CYDSTUDIO_BOARD_LILYGO_T_QT_PRO

[env:t-display-s3-amoled]
; LILYGO T-Display S3 AMOLED — 536x240 RM67162 over QSPI, ESP32-S3
extends = _esp32s3_base
build_flags =
  ${_esp32s3_base.build_flags}
  -D CYDSTUDIO_BOARD_LILYGO_T_DISPLAY_S3_AMOLED

; ---------------------------------------------------------------------------
; OTA mirror envs (set upload_port to your device's mDNS name at flash time)
; ---------------------------------------------------------------------------

[env:cyd-2432s028-ota]
extends = env:cyd-2432s028
upload_protocol = espota
; Override on the command line: pio run -e cyd-2432s028-ota -t upload --upload-port my-device.local
upload_port = cydstudio.local
